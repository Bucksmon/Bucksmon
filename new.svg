<svg viewBox="0 0 1000 350"
     width="100%"
     xmlns="http://www.w3.org/2000/svg">

 <defs>

    <!-- 🌌 BG -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>

    <!-- ⚡ GLOW -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2"/>
      <feGaussianBlur stdDeviation="6"/>
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <!-- ⚡ CHAOTIC DISTORTION -->
    <filter id="warp">
      <feTurbulence type="fractalNoise"
                    baseFrequency="0.01"
                    numOctaves="3"
                    seed="2">
        <animate attributeName="seed"
                 values="2;8;3;10;2"
                 dur="3s"
                 repeatCount="indefinite"/>
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="6"/>
    </filter>

    <!-- 🎯 TARGET RETICLE -->
    <g id="reticle">
      <circle r="40" stroke="#6ea8ff" fill="none" stroke-width="1"/>
      <circle r="20" stroke="#6ea8ff" fill="none" stroke-width="1"/>
      <line x1="-50" x2="-20" stroke="#6ea8ff"/>
      <line x1="50" x2="20" stroke="#6ea8ff"/>
      <line y1="-50" y2="-20" stroke="#6ea8ff"/>
      <line y1="50" y2="20" stroke="#6ea8ff"/>
    </g>

  </defs>

  <!-- 🌌 BACKGROUND -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- 🎮 PARALLAX GRID -->
  <g opacity="0.15">
    <path d="M0 300 L1000 300 M0 250 L1000 250 M0 200 L1000 200"
          stroke="#1f2937"/>
  </g>

 

  <!-- ⚡ SHOCKWAVE -->
  <circle cx="500" cy="175" r="25"
          stroke="#6ea8ff"
          fill="none"
          stroke-width="2"
          opacity="0.5">
    <animate attributeName="r"
             from="25" to="260"
             dur="2s"
             repeatCount="indefinite"/>
    <animate attributeName="opacity"
             values="0.5;0"
             dur="2s"
             repeatCount="indefinite"/>
  </circle>

  <!-- 🎯 LOCK-ON RETICLE -->
  <g transform="translate(500,175)" opacity="0.6">
    <use href="#reticle">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0" to="360"
                        dur="6s"
                        repeatCount="indefinite"/>
    </use>
  </g>

  

  <!-- ⚡ CROSS ENERGY BEAMS -->
  <g stroke="#6ea8ff" stroke-width="1" opacity="0.2">
    <line x1="0" y1="0" x2="1000" y2="350">
      <animate attributeName="opacity"
               values="0.1;0.4;0.1"
               dur="2s"
               repeatCount="indefinite"/>
    </line>
    <line x1="1000" y1="0" x2="0" y2="350">
      <animate attributeName="opacity"
               values="0.1;0.4;0.1"
               dur="2.2s"
               repeatCount="indefinite"/>
    </line>
  </g>

  <!-- ⚡ LIGHTNING CHAOS -->
  <g stroke="#8affff" fill="none" filter="url(#glow)">

    <path d="M200 100 L240 150 L220 150 L270 230">
      <animate attributeName="opacity"
               values="0;1;0"
               dur="1.2s"
               repeatCount="indefinite"/>
    </path>

    <path d="M800 90 L760 140 L780 140 L720 230">
      <animate attributeName="opacity"
               values="0;1;0"
               dur="1.5s"
               begin="0.5s"
               repeatCount="indefinite"/>
    </path>

  </g>

  <!-- ⚡ PARTICLE SYSTEM -->
  <g fill="#8affff" filter="url(#glow)">

    <!-- multiple offsets = fake randomness -->
    <circle cx="500" cy="175" r="2">
      <animate attributeName="cx" values="500;650" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="175;100" dur="0.6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="0.6s" repeatCount="indefinite"/>
    </circle>

    <circle cx="500" cy="175" r="2">
      <animate attributeName="cx" values="500;350" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="175;250" dur="0.7s" begin="0.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="0.7s" repeatCount="indefinite"/>
    </circle>

    <circle cx="500" cy="175" r="2">
      <animate attributeName="cx" values="500;700" dur="0.5s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="175;200" dur="0.5s" begin="0.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0" dur="0.5s" repeatCount="indefinite"/>
    </circle>

  </g>

 




  <!-- 🧠 SYSTEM TEXT -->
  <text x="500" y="320"
        text-anchor="middle"
        font-size="14"
        fill="#9ca3af"
        font-family="monospace">
    TARGET LOCKED • ENERGY STABLE • RENDER PIPELINE ACTIVE
  </text>

 

  <!-- 🗺️ MINI RADAR -->
  <g transform="translate(850,260)">
    <circle r="40" stroke="#6ea8ff" fill="none" opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="0"
          stroke="#6ea8ff"
          stroke-width="2">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="360"
                        dur="3s"
                        repeatCount="indefinite"/>
    </line>
  </g>

  

  <!-- 📝 SUBTEXT -->
  <text x="500" y="320"
        text-anchor="middle"
        font-size="14"
        fill="#9ca3af"
        font-family="monospace">
    GTA DEV SYSTEM INITIALIZED
  </text>

</svg>





















 


