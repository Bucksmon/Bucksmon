<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">

  <!-- background -->
  <rect width="100%" height="100%" fill="#050816"/>

  <!-- ⚡ SINGLE SHOOTING STREAK -->
  <line x1="300" y1="150" x2="500" y2="150"
        stroke="#6ea8ff"
        stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="200"
        stroke-dashoffset="100"
        opacity="0">

    <!-- movement -->
    <animate attributeName="stroke-dashoffset"
             from="200"
             to="-200"
             dur="1.5s"
             repeatCount="indefinite"/>
    <!-- visibility timing -->
    <animate attributeName="opacity"
             values="0;1;1;0"
             keyTimes="0;0.2;0.6;1"
             dur="2s"
             repeatCount="indefinite"/>


  </line>

  <!-- ✨ TEXT -->
  <text x="50%" y="110"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="58"
        font-family="Impact"
        fill="#6ea8ff"
        stroke="#000"
        stroke-width="5">
    GTA DEV
  </text>

</svg>
