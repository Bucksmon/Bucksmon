<svg viewBox="0 0 1000 350"
     width="100%"
     xmlns="http://www.w3.org/2000/svg">

  <defs>

   

  </defs>

  <!-- 🌌 BG -->
  <rect width="100%" height="100%" fill="transparent"/>

 
 

  <!-- 🗺️ MINI RADAR -->
  <g transform="translate(850,260)">
    <circle r="40" stroke="#6ea8ff" fill="none" opacity="0.3"/>
    <line x1="0" y1="0" x2="40" y2="0"
          stroke="#6ea8ff"
          stroke-width="2">
      <animateTransform attributeName="transform"
                        type="rotate"
                        from="0"
                        to="360"
                        dur="3s"
                        repeatCount="indefinite"/>
    </line>
  </g>

  

  <!-- 📝 SUBTEXT -->
  <text x="500" y="320"
        text-anchor="middle"
        font-size="14"
        fill="#9ca3af"
        font-family="monospace">
    GTA DEV SYSTEM INITIALIZED
  </text>

</svg>
