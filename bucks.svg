<svg width="600" height="180" xmlns="http://www.w3.org/2000/svg">

  <style>
    .text {
      font: bold 40px monospace;
      fill: #00ffc6;
      text-anchor: middle;
      dominant-baseline: middle;
      filter: url(#glow);
      animation: flicker 2s infinite alternate;
    }

    @keyframes flicker {
      0% { opacity: 1; }
      50% { opacity: 0.7; }
      100% { opacity: 1; }
    }
  </style>

  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 🔹 Image on top -->
  <image 
    href="https://raw.githubusercontent.com/Bucksmon/Bucksmon/main/Image/Dark.png"
    x="50%" 
    y="20"
    width="80"
    height="80"
    transform="translate(-40,0)"
  />

  <!-- 🔹 Neon text below -->
  <text x="50%" y="130" class="text">BUCKSMON</text>

</svg>
