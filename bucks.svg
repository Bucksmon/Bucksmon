<svg width="600" height="200" xmlns="http://www.w3.org/2000/svg">

  <style>
    .text {
      font: 700 48px monospace;
      fill: url(#neonGradient);
      text-anchor: middle;
      dominant-baseline: middle;
      filter: url(#neonGlow);
      letter-spacing: 3px;

      /* smooth animation */
      animation: breathe 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: center;
    }

    @keyframes breathe {
      0% {
        opacity: 0.9;
        transform: scale(1);
      }
      50% {
        opacity: 1;
        transform: scale(1.02); /* subtle expansion */
      }
      100% {
        opacity: 0.9;
        transform: scale(1);
      }
    }
  </style>

  <defs>

    <!-- Gradient -->
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6ea8ff"/>
      <stop offset="50%" stop-color="#4f8cff"/>
      <stop offset="100%" stop-color="#2f6fff"/>
    </linearGradient>

    <!-- Single consistent glow -->
    <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur1"/>
      <feGaussianBlur stdDeviation="8" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <text x="50%" y="100" class="text">GTA Dev</text>

</svg>
