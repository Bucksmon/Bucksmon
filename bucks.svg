<svg viewBox="0 0 800 150"
     width="100%"
     preserveAspectRatio="xMidYMid meet"
     xmlns="http://www.w3.org/2000/svg">

  <style>
    .title {
  font-family: "HK Modular";
      font-weight: 900;
      font-size: 58px;
      fill: #6ea8ff;

      stroke: #000;
      stroke-width: 5px;
      paint-order: stroke fill;

      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 6px;
    }

    .star-inner { opacity: 0.2; }

    .s1 { animation: flicker1 2.7s infinite ease-in-out; }
    .s2 { animation: flicker2 3.3s infinite ease-in-out; }
    .s3 { animation: flicker3 2.1s infinite ease-in-out; }
    .s4 { animation: flicker4 3.8s infinite ease-in-out; }
    .s5 { animation: flicker5 2.9s infinite ease-in-out; }

    @keyframes flicker1 {
      0%,100% { opacity: 0.1; }
      40% { opacity: 1; }
      70% { opacity: 0.3; }
    }

    @keyframes flicker2 {
      0%,100% { opacity: 0.2; }
      50% { opacity: 1; }
    }

    @keyframes flicker3 {
      0%,100% { opacity: 0.15; }
      30% { opacity: 0.9; }
      80% { opacity: 0.2; }
    }

    @keyframes flicker4 {
      0%,100% { opacity: 0.1; }
      60% { opacity: 1; }
    }

    @keyframes flicker5 {
      0%,100% { opacity: 0.2; }
      45% { opacity: 1; }
      75% { opacity: 0.4; }
    }
  </style>

  <defs>
    
  </defs>

  <!-- 🌌 Background -->
  <rect width="100%" height="100%" fill="transparent"/>

  <!-- ⭐ STARS -->
  <g stroke="#ffd95a" stroke-width="0.5">

    <g transform="translate(80,40) scale(0.7)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner s1" fill="#ffd95a"
        points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <g transform="translate(300,30) scale(0.6)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner s2" fill="#ffe07a"
        points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <g transform="translate(600,50) scale(0.8)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner s3" fill="#ffd95a"
        points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <g transform="translate(720,30) scale(0.6)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner s4" fill="#ffdf6b"
        points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <g transform="translate(500,20) scale(0.5)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner s5" fill="#ffd95a"
        points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

  </g>

  <!-- ✨ TEXT -->
  <text x="50%" y="110" class="title">GTA DEV</text>

  <!-- ⚡ UNDERLINE -->
  <line x1="225" y1="140" x2="565" y2="140"
        stroke="#6ea8ff"
        stroke-width="4"
        stroke-linecap="round"
        stroke-dasharray="400"
        stroke-dashoffset="400"
        opacity="0">

    <animate attributeName="stroke-dashoffset"
             from="400"
             to="-400"
             dur="2s"
             repeatCount="indefinite"/>

    <animate attributeName="opacity"
             values="0;0.8;1;1;0.8;0"
             keyTimes="0;0.15;0.3;0.7;0.85;1"
             dur="2s"
             repeatCount="indefinite"/>

  </line>

</svg>
