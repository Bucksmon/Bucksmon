<svg width="800" height="250" viewBox="0 0 800 250" xmlns="http://www.w3.org/2000/svg">

  <style>
    .title {
      font: 900 58px monospace;
      fill: #7fb2ff;
      text-anchor: middle;
      dominant-baseline: middle;
      letter-spacing: 6px;
      filter: url(#neonGlow);
      animation: breathe 4s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { opacity: 0.92; }
      50% { opacity: 1; }
    }

    /* ⭐ inner flicker only */
    .star-inner {
      animation: starFlicker 2.5s ease-in-out infinite;
    }

    @keyframes starFlicker {
      0% { opacity: 0.1; }
      50% { opacity: 1; }
      100% { opacity: 0.1; }
    }

    /* stagger flickers */
    .delay1 { animation-delay: 0.3s; }
    .delay2 { animation-delay: 0.6s; }
    .delay3 { animation-delay: 1s; }
    .delay4 { animation-delay: 1.4s; }
    .delay5 { animation-delay: 1.8s; }

    /* 🚓 police breathing */
    .redGlow {
      animation: redPulse 3s ease-in-out infinite;
    }

    .blueGlow {
      animation: bluePulse 3s ease-in-out infinite;
    }

    @keyframes redPulse {
      0%,100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.15); }
    }

    @keyframes bluePulse {
      0%,100% { opacity: 0.15; transform: scale(1); }
      50% { opacity: 0.35; transform: scale(1.15); }
    }

  </style>

  <defs>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#050816"/>
      <stop offset="100%" stop-color="#000"/>
    </linearGradient>
<filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
  <!-- soft glow layers -->
  <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur1"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur2"/>
  <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur3"/>

  <!-- merge glow + original -->
  <feMerge>
    <feMergeNode in="blur3"/>
    <feMergeNode in="blur2"/>
    <feMergeNode in="blur1"/>
    <feMergeNode in="SourceGraphic"/>
  </feMerge>
</filter>

    <radialGradient id="redLight">
      <stop offset="0%" stop-color="#ff2a2a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <radialGradient id="blueLight">
      <stop offset="0%" stop-color="#2a6fff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

  </defs>

  <!-- 🌌 Background -->
  <rect width="100%" height="100%" fill="url(#bgGradient)"/>

  <!-- ⭐ Random GTA Stars -->
  <g fill="#ffd95a" stroke="#ffd95a" stroke-width="0.5">

    <!-- star 1 -->
    <g transform="translate(80,40) scale(0.7)">
      <polygon points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7" fill="none"/>
      <polygon class="star-inner" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <!-- star 2 -->
    <g transform="translate(300,30) scale(0.6)">
      <polygon points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7" fill="none"/>
      <polygon class="star-inner delay1" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <!-- star 3 -->
    <g transform="translate(600,50) scale(0.8)">
      <polygon points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7" fill="none"/>
      <polygon class="star-inner delay2" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <!-- star 4 -->
    <g transform="translate(720,30) scale(0.6)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner delay3" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

    <!-- star 5 -->
    <g transform="translate(500,20) scale(0.5)">
      <polygon fill="none" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
      <polygon class="star-inner delay4" points="10,0 13,7 20,7 14.5,11.5 17,18 10,14 3,18 5.5,11.5 0,7 7,7"/>
    </g>

  </g>

  <!-- 🌆 Skyline -->
  <path d="M0 190 
           L50 160 L70 190 
           L120 150 L140 190
           L200 140 L230 190
           L300 160 L330 190
           L400 130 L430 190
           L500 150 L530 190
           L600 160 L630 190
           L700 140 L730 190
           L800 170 L800 250 L0 250 Z"
        fill="#05070f"/>

  <!-- 🚓 Static breathing lights -->
  <circle cx="300" cy="110" r="140" fill="url(#redLight)" class="redGlow"/>
  <circle cx="500" cy="110" r="140" fill="url(#blueLight)" class="blueGlow"/>

  <!-- ✨ Title -->
  <text x="50%" y="110" class="title">BUCKSMON</text>

</svg>
